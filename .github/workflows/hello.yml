name: Luong Kiem Thu Va Dong Goi (CI/CD)

on:
  push:
    branches:
      - main

jobs:
  kiem-thu-va-dong-goi:
    runs-on: ubuntu-latest
    
    steps:
      - name: Buoc 1 - Tai code ve may chu
        uses: actions/checkout@v4
      
      - name: Buoc 2 - Cai dat Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Buoc 3 - Kiem thu (Test)
        run: python check_system.py
        
      # MỚI: Dùng Action có sẵn để đăng nhập vào Docker Hub một cách an toàn
      - name: Buoc 4 - Dang nhap vao Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      # MỚI: Build và Push Image lên thẳng Docker Hub
      - name: Buoc 5 - Build và Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Đổi tên image theo đúng chuẩn của Docker Hub: <username>/<tên-image>:<tag>
          tags: b0cch1/he-thong-kiem-tra:latest
      # MỚI: Giả lập quá trình server tải và chạy ứng dụng
      - name: Buoc 6 - Gia lap Trien khai (Deployment)
        run: |
          echo "1. Dang ket noi vao Server..."
          echo "2. Keo Image moi nhat tu kho luu tru..."
          docker pull b0cch1/he-thong-kiem-tra:latest
          
          echo "3. Khoi chay ung dung tren Server..."
          docker run b0cch1/he-thong-kiem-tra:latest
